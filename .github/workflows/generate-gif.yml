name: Generate GIF

on:
  push:
    branches: [ master ]

concurrency:
  group: generate-gif
  cancel-in-progress: true

jobs:
  generate-gif:
    name: Generate demo GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4

      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets
          path: assets_checkout

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build demo GIFs
        uses: docker/bake-action@v6
        with:
          files: docker/docker-bake.hcl
          source: .
          targets: demos
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Copy demo GIFs into assets checkout
        shell: bash
        working-directory: assets_checkout
        run: |
          mv ../*.gif ./

      - name: Create Pull Request
        working-directory: assets_checkout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B update-demo-gifs
          git add *.gif
          git diff --cached --quiet && echo "No changes to GIFs" && exit 0
          git commit -m "chore: update demo gifs"
          git push --force origin update-demo-gifs
          gh pr create \
            --title "chore: update demo gifs" \
            --body "Automated PR to update the demo GIFs generated by VHS." \
            --base assets \
            --head update-demo-gifs \
          || gh pr edit update-demo-gifs \
            --title "chore: update demo gifs" \
            --body "Automated PR to update the demo GIFs generated by VHS."
