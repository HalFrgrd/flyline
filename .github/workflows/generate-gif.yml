name: Generate GIF

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: generate-gif
  cancel-in-progress: true

jobs:
  generate-gif:
    name: Generate demo GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download evp
        run: |
          mkdir -p /tmp/evp-extract
          curl -fsSL https://github.com/HalFrgrd/evp/releases/download/v0.4.0/evp-0.4.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /tmp/evp-extract
          cp /tmp/evp-extract/evp docker/evp
          chmod +x docker/evp

      - name: Build demo GIFs
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          source: .
          targets: demos
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Upload GIFs to assets release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create assets --title "assets" --notes "Demo GIF storage" 2>/dev/null || true
          gh release upload assets *.gif --clobber
