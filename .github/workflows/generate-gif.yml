name: Generate GIF

on:
  push:
    branches: [ main, master ]

concurrency:
  group: generate-gif
  cancel-in-progress: true

jobs:
  generate-gif:
    name: Generate demo GIF
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build demo GIF
        uses: docker/bake-action@v6
        with:
          files: docker/docker-bake.hcl
          source: .
          targets: vhs-extracted-gif
          set: |
            vhs-extracted-gif.output=type=local,dest=assets/
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update demo gif"
          title: "chore: update demo gif"
          body: "Automated PR to update the demo GIF generated by VHS."
          branch: update-demo-gif
          add-paths: assets/**
