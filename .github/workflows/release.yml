name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build and test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            docker_platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            docker_platform: linux/arm64
          - target: armv7-unknown-linux-gnueabihf
            docker_platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build ${{ matrix.target }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Test in bash (${{ matrix.target }})
        run: |
          docker run --platform ${{ matrix.docker_platform }} --rm \
            -v "$PWD/target/${{ matrix.target }}/release/libflyline.so:/libflyline.so:ro" \
            ubuntu:16.04 \
            /bin/bash -i -c "enable -f /libflyline.so flyline && flyline --version && echo 'SUCCESS: flyline loaded in bash'"

      - name: Prepare release artifact
        run: |
          cp "target/${{ matrix.target }}/release/libflyline.so" \
             "libflyline-${{ matrix.target }}.so"

      - name: Upload release artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: libflyline-${{ matrix.target }}.so
