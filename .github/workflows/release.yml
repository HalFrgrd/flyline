name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get the release version from the tag
        if: env.VERSION == ''
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
      - name: Show the version
        run: |
          echo "version is: $VERSION"
      - name: Check that tag version and Cargo.toml version are the same
        shell: bash
        run: |
          if ! grep -q "version = \"${VERSION#v}\"" Cargo.toml; then
            echo "version does not match Cargo.toml" >&2
            exit 1
          fi
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$VERSION" --draft --verify-tag --title "$VERSION"
    outputs:
      version: ${{ env.VERSION }}

  build-release:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          # - armv7-unknown-linux-gnueabihf
          # - armv7-unknown-linux-musleabihf
          # - armv7-unknown-linux-musleabi
          # - i686-unknown-linux-gnu
          # - x86_64-unknown-freebsd
          # - s390x-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build ${{ matrix.target }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare release artifact
        run: |
          ARCHIVE="libflyline-${{ github.ref_name }}-${{ matrix.target }}"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Build archive (Linux)
        shell: bash
        run: |
          tar czf "$ARCHIVE.tar.gz" -C "target/${{ matrix.target }}/release" libflyline.so
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"
          echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SUM=$ARCHIVE.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "$version" ${{ env.ASSET }} ${{ env.ASSET_SUM }}

  build-release-macos:
    name: Build (${{ matrix.target }})
    needs: create-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build ${{ matrix.target }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release artifact
        run: |
          ARCHIVE="libflyline-${{ github.ref_name }}-${{ matrix.target }}"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Build archive (macOS)
        shell: bash
        run: |
          tar czf "$ARCHIVE.tar.gz" -C "target/${{ matrix.target }}/release" libflyline.dylib
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"
          echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SUM=$ARCHIVE.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "$version" ${{ env.ASSET }} ${{ env.ASSET_SUM }}

  build-release-macos-pre-bash-4-4:
    name: Build pre_bash_4_4 (${{ matrix.target }})
    needs: create-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build ${{ matrix.target }} with pre_bash_4_4 feature
        run: cargo build --release --target ${{ matrix.target }} --features pre_bash_4_4

      - name: Prepare release artifact
        run: |
          ARCHIVE="libflyline-${{ github.ref_name }}-${{ matrix.target }}_pre_bash_4_4"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Build archive (macOS pre_bash_4_4)
        shell: bash
        run: |
          tar czf "$ARCHIVE.tar.gz" -C "target/${{ matrix.target }}/release" libflyline.dylib
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"
          echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SUM=$ARCHIVE.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "$version" ${{ env.ASSET }} ${{ env.ASSET_SUM }}

  build-release-linux-pre-bash-4-4:
    name: Build pre_bash_4_4 (x86_64-unknown-linux-gnu)
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build x86_64-unknown-linux-gnu with pre_bash_4_4 feature
        run: cross build --release --target x86_64-unknown-linux-gnu --features pre_bash_4_4

      - name: Prepare release artifact
        run: |
          ARCHIVE="libflyline-${{ github.ref_name }}-x86_64-unknown-linux-gnu_pre_bash_4_4"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Build archive
        shell: bash
        run: |
          tar czf "$ARCHIVE.tar.gz" -C "target/x86_64-unknown-linux-gnu/release" libflyline.so
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"
          echo "ASSET=$ARCHIVE.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SUM=$ARCHIVE.tar.gz.sha256" >> $GITHUB_ENV

      - name: Upload release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ needs.create-release.outputs.version }}"
          gh release upload "$version" ${{ env.ASSET }} ${{ env.ASSET_SUM }}

  publish-release:
    name: publish-release
    needs: [create-release, build-release, build-release-linux-pre-bash-4-4, build-release-macos, build-release-macos-pre-bash-4-4]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.version }}" --prerelease --draft=false --repo HalFrgrd/flyline

  test-installation:
    name: test-installation
    needs: [create-release, publish-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Test installation on Alpine and Ubuntu
        env:
          FLYLINE_RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          docker buildx bake -f docker/docker-bake.hcl install-test-alpine install-test-ubuntu install-test-bash-3-2-57
