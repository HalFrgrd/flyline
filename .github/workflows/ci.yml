name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-ubuntu-1604:
    name: Build and test on Ubuntu 16.04
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/bake-action@v6
        with:
          files: docker/docker-bake.hcl
          targets: extract-artifact
          set: |
            extract-artifact.output=type=local,dest=${{ runner.temp }}/docker/build
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Save built library artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-flyline-library
          path: ${{ runner.temp }}/docker/build/libflyline.so


  run-library-tests:
    name: Run library tests
    needs: build-ubuntu-1604
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests
        # running the tests by building an image is a cache friendly way to do it
        # if we build a container, the previous step would need to have exported the image to docker
        # which is slow
        uses: docker/bake-action@v6
        with:
          files: docker/docker-bake.hcl
          targets: lib-tests
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
  
  bash-integration-tests-matrix:
    name: Create bash integration tests matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      - name: Generate matrix
        id: generate
        uses: docker/bake-action/subaction/matrix@v6
        with:
          files: docker/docker-bake.hcl
          target: bash-integration-tests

  bash-integration-tests:
    name: Bash integration tests using built library
    runs-on: ubuntu-latest
    needs:
      - bash-integration-tests-matrix
      - build-ubuntu-1604
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.bash-integration-tests-matrix.outputs.matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests
        uses: docker/bake-action@v6
        with:
          files: docker/docker-bake.hcl
          targets: ${{ matrix.target }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

  tab-completion-tests:
    name: Test tab completion using built library
    needs: build-ubuntu-1604
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tab completion tests
        uses: docker/bake-action@v6
        with:
          files: docker/docker-bake.hcl
          targets: tab-completion-tests
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
