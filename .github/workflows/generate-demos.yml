name: Generate Demos

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: generate-demos
  cancel-in-progress: true

# Upgraded permissions to allow GitHub Actions to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-demos:
    name: Generate demo assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build demo assets
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          source: .
          targets: demos
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      # Step 1: Stage the demo files into a dedicated deployment directory
      - name: Stage assets for Pages
        run: |
          mkdir -p public-pages
          cp *.svg public-pages/

      # Step 2: Bundle and upload the folder to GitHub's Pages infrastructure
      - name: Upload demo assets to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public-pages'

      # Step 3: Trigger the live, zero-commit web deployment
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4