[package]
name = "flyline"
version = "0.6.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
clap = { version = "4.5.49", features = ["derive"] }
clap_complete = "4.5.66"
ratatui = { version = "0.30.0", features = ["default"] }
# Fork of crossterm that adds query_background_color() / query_foreground_color() (OSC 10/11).
# Track upstream PR: https://github.com/crossterm-rs/crossterm/compare/master...nornagon:crossterm:nornagon/color-query
crossterm = { git = "https://github.com/nornagon/crossterm", rev = "87db8bfa6dc99427fd3b071681b07fc31c6ce995" }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3.31"
log = "0.4"
ansi-to-tui = "8.0.1"
libc = "0.2.177"
timeago = "0.5.0"
anyhow = "1.0.100"
unicode-width = { version = "0.2.0", default-features = false }
unicode-segmentation = "1.12.0"
itertools = "0.14.0"
glob = "0.3.3"
color-eyre = "0.6.5"
flash = { git = "https://github.com/HalFrgrd/flash.git", rev = "e515077183c61ff21a7d66f9fe8a8198acc01b64" }
skim = { version = "3.6.0", default-features =  false, features = []}
lscolors = "0.21.0"
serde_json = "1.0"
pulldown-cmark = { version = "0.13", default-features = false }
regex = "1"
rand = "0.10.0"
parse-style = { version = "0.2.0" }


[dependencies.tokio]
version = "1.47.1"
features = ["full"]
default-features = false

[features]
integration-tests = []

[build-dependencies]
chrono = { version = "0.4" }

[patch.crates-io]
ratatui-core = { path = "vendor/ratatui-core" }

# cross-rs configurations
[package.metadata.cross.target.x86_64-unknown-linux-gnu]
# the centos version has an older glibc which helps with compatibility
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:main-centos"
[package.metadata.cross.target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main-centos"
