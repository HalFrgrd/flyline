[package]
name = "flyline"
version = "0.5.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
clap = { version = "4.5.49", features = ["derive"] }
clap_complete = "4.5.66"
ratatui = { git = "https://github.com/Marlinski/ratatui.git", rev = "fd8e0f024847af467129e0a166390d7e291c1b2e", features = ["default"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3.31"
log = "0.4"
ansi-to-tui = { git = "https://github.com/HalFrgrd/ansi-to-tui.git", rev = "9101076f8e23010515ff6fe1571bf87a2d0d4abc"}
libc = "0.2.177"
timeago = "0.5.0"
anyhow = "1.0.100"
unicode-width = { version = "0.2.0", default-features = false }
unicode-segmentation = "1.12.0"
itertools = "0.14.0"
glob = "0.3.3"
color-eyre = "0.6.5"
flash = { git = "https://github.com/HalFrgrd/flash.git", rev = "30fdd4b7a6e7d5cd0ac0d24b2fb819bf34cd62d6" }
skim = { version = "3.6.0", default-features =  false, features = []}
lscolors = "0.21.0"
serde_json = "1.0"
regex = "1"
rand = "0.10.0"

[dependencies.crossterm]
version = "0.29.0"
features = ["event-stream"]

[dependencies.tokio]
version = "1.47.1"
features = ["rt-multi-thread", "io-util", "sync", "full", "net", "signal", "rt", "process", "time", "io-std", "parking_lot", "macros"]
default-features = false

[features]
integration-tests = []

# cross-rs configurations
[workspace.metadata.cross.target.x86_64-unknown-linux-gnu]
# the centos version has an older glibc which helps with compatibility
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:main-centos"
[workspace.metadata.cross.target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main-centos"
