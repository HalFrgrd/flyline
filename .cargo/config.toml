
# We don't want to statically link musl.
# These builds are for systems where bash is built with musl
# and thus it is best to build the builtin with musl dynamically linked so at load time, the builtin can link to bash's symbols.
# Note that we might not need to do this since I try to use xfree and xmalloc instead of the libc allocator, but just to be safe.
[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=-crt-static",
]
[target.aarch64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=-crt-static",
]
